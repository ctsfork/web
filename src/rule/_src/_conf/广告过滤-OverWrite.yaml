##----------------------------------------覆写分组---------------------------------------
##  https://clashmi.app/wiki/outbound#proxy-groups-%E7%AD%96%E7%95%A5%E7%BB%84
##  include-all: true    ->   该属性自动包含：订阅导入的proxies或者proxy-providers中配置的所有节点
##  type: 节点类型    ->  select,url-test,load-balance,fallback,relay
proxy-groups:
- name: "🔰 节点选择"
  type: select
  include-all: true     
  exclude-type: direct
  proxies:
    - "♻️ 自动选择"
    - "🎯 全球直连"

- name: "♻️ 自动选择"
  type: url-test
  url: "http://www.gstatic.com/generate_204"
  include-all: true
  exclude-type: direct
  interval: 300
  tolerance: 10


- name: "⛔️ 广告拦截"
  type: select
  proxies:
    - "🛑 全球拦截"
    - "🎯 全球直连"
    - "🔰 节点选择"

- name: "🚫 运营劫持"
  type: select
  proxies:
    - "🛑 全球拦截"
    - "🎯 全球直连"
    - "🔰 节点选择"


- name: "🇨🇳 国内直连"
  type: select
  proxies:
    - "🎯 全球直连"
    - "🔰 节点选择"

- name: "🌍 国外直连"
  type: select
  proxies:
    - "🎯 全球直连"
    - "🔰 节点选择"

- name: "🌍 国外代理"
  type: select
  proxies:
    - "🔰 节点选择"
