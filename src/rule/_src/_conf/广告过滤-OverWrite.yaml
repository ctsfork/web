##
## 设置远程分组
## 注意设置规则分组时，不要直接设置到“🎯 全球直连”，“🛑 全球拦截”这两个分组。防止规则错误时无法更改代理方式，因该设置到“🌍 国外直连”，“🇨🇳 国内直连”分组，这样可以更改路由规则。
##
## 可参考：https://github.com/MetaCubeX/meta-rules-dat
## 注意：mrs 与yaml 类型文件，的下载路径只有最后的后缀名有区别，下面注释的规则导入就是基本的模版请求。
##
##
- RULE-SET,LocalAreaNetwork,🎯 全球直连

## 需要国内直连或者不推荐使用代理的域名列表
- RULE-SET,KimiDirectDomains,🇨🇳 国内直连
## 破解软件时需要拦截的域名列表
- RULE-SET,KimiRejectDomains,🛑 全球拦截

- RULE-SET,AD-KimiCustom,⛔️ 广告拦截
## KimiURLRule.list - URL-REGEX不被Clash支持，所以该规则列表不被Clash支持
- RULE-SET,AD-KimiURLRule,⛔️ 广告拦截


# - RULE-SET,AD-AdblockFilters,⛔️ 广告拦截
- RULE-SET,AD-AdblockFilters-Lite,⛔️ 广告拦截
