##
## ClashMi 实现LocalDevVPN同等功效配置文件
## https://github.com/tom-snow/Sidestore-ClashMi



mixed-port: 7890
port: 0
socks-port: 0
ipv6: true
unified-delay: false
tcp-concurrent: true
# external-controller: 127.0.0.1:9090
# external-ui: ui
# external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

find-process-mode: strict
client-fingerprint: chrome


profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.mi.com"
    - "+.mijia.com"
    - "+.push.apple.com"  

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  loopback-address:
    - 10.7.0.1

dns:
  enable: true
  prefer-h3: true
  ipv6: true
  ipv6-timeout: 300
  use-hosts: true
  use-system-hosts: true
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - "+.market.xiaomi.com"
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - time-ios.apple.com
    - time1.*.com
    - time2.*.com
    - time3.*.com
    - time4.*.com
    - time5.*.com
    - time6.*.com
    - time7.*.com
    - ntp.*.com
    - ntp1.*.com
    - ntp2.*.com
    - ntp3.*.com
    - ntp4.*.com
    - ntp5.*.com
    - ntp6.*.com
    - ntp7.*.com
    - '*.time.edu.cn'
    - '*.ntp.org.cn'
    - '*.pool.ntp.org'
    - +.services.googleapis.cn
    - +.push.apple.com
    - time1.cloud.tencent.com
    - localhost.ptlogin2.qq.com
    - +.stun.*.*
    - +.stun.*.*.*
    - +.stun.*.*.*.*
    - +.stun.*.*.*.*.*
    - lens.l.google.com
    - '*.n.n.srv.nintendo.net'
    - +.stun.playstation.net
    - xbox.*.*.microsoft.com
    - '*.*.xboxlive.com'
    - '*.msftncsi.com'
    - '*.msftconnecttest.com'
    - '*.mcdn.bilivideo.cn'
    - +.bilibili.com
    - +.bilicdn.com
    - +.bilivideo.com
    - +.market.xiaomi.com
    - WORKGROUP
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - 8.8.4.4
    - 1.0.0.1
    - 1.1.1.1
    - system
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - 8.8.4.4
    - 1.0.0.1
    - 1.1.1.1
    - tls://223.5.5.5:853
    - tls://8.8.8.8
    - tls://8.8.4.4
    - tls://1.0.0.1
    - tls://1.1.1.1
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query#h3=true
    - https://mozilla.cloudflare-dns.com/dns-query#DNS&h3=true
    - quic://dns.adguard.com:784
    - system





proxy-groups:
- name: "🔰 节点选择"
  type: select
  include-all: true     
  exclude-type: direct
  proxies:
    - "🎯 全球直连"


- name: "🎯 全球直连"
  type: select
  proxies:
    - DIRECT

- name: "🐟 漏网之鱼"
  type: select
  proxies:
    - "🔰 节点选择"
    - "🎯 全球直连"



rules:
# Github站点代理服务器
- DOMAIN-SUFFIX,gh-proxy.net,🎯 全球直连
- DOMAIN-SUFFIX,gh-proxy.com,🎯 全球直连


