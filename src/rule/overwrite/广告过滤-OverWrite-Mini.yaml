## 广告过滤规则站点:
##     1. https://github.com/217heidai/adblockfilters
##     2. https://github.com/TG-Twilight/AWAvenue-Ads-Rule
##     3. https://github.com/blackmatrix7/ios_rule_script
##     4. https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
##
##
## behavior: 规则文件内容格式
##          classical: 传统格式 -> 规则文件格式示例如下：
##                    1. https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
##                    2. https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockclash.list
##          domain: yaml中payload节点格式  -> 规则文件格式示例如下：
##                 1. https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/AdvertisingLite/AdvertisingLite.yaml
##
