mixed-port: 7890
port: 0
socks-port: 0
ipv6: true
unified-delay: false
tcp-concurrent: true
# external-controller: 127.0.0.1:9090
# external-ui: ui
# external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

find-process-mode: strict
client-fingerprint: chrome




profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
